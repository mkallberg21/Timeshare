name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # ─── TypeScript / NestJS / Next.js ──────────────────────────────────────────
  typescript:
    name: TypeScript (lint + type-check + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint --filter=[HEAD^1]

      - name: Type check
        run: pnpm turbo run type-check --filter=[HEAD^1]

      - name: Test
        run: pnpm turbo run test --filter=[HEAD^1]

  # ─── Python services ────────────────────────────────────────────────────────
  python:
    name: Python (lint + type-check + test)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - services/ai-orchestrator
          - services/document-service
          - services/ml-service
          - services/resort-intelligence
    defaults:
      run:
        working-directory: exitforge/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: pip install ruff && ruff check app/

      - name: Pyright type check
        run: pip install pyright && pyright app/

  # ─── Terraform validate ─────────────────────────────────────────────────────
  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: exitforge/infrastructure/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8"

      - run: terraform init -backend=false
      - run: terraform validate
      - run: terraform fmt -check -recursive
