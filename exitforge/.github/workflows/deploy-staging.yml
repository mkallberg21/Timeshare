name: Deploy — Staging

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Build & Push ${{ matrix.service }}
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - case-service
          - intake-service
          - negotiation-service
          - communication-service
          - payment-service
          - legal-service
          - document-service
          - ml-service
          - ai-orchestrator
          - resort-intelligence
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: exitforge/services/${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/exitforge/${{ matrix.service }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/exitforge/${{ matrix.service }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Helm Upgrade — Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name exitforge-staging --region us-east-1

      - name: Helm upgrade
        run: |
          helm upgrade --install exitforge-staging exitforge/infrastructure/kubernetes \
            --namespace exitforge-staging \
            --create-namespace \
            --values exitforge/infrastructure/kubernetes/values.yaml \
            --set global.imageTag=${{ github.sha }} \
            --atomic \
            --timeout 10m

      - name: Smoke tests
        run: |
          sleep 30
          curl -f https://staging-api.exitforge.com/health || exit 1

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Staging deploy ${{ job.status == 'success' && '✅ succeeded' || '❌ failed' }} for `${{ github.sha }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
