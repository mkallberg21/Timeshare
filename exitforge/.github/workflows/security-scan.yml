name: Security Scan

on:
  schedule:
    - cron: '0 2 * * *'   # Nightly at 2 AM UTC
  workflow_dispatch:        # Manual trigger

jobs:
  snyk-node:
    name: Snyk — Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: exitforge/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: exitforge

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects
        continue-on-error: false

  snyk-python:
    name: Snyk — Python (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ai-orchestrator, document-service, ml-service, resort-intelligence]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt
        working-directory: exitforge/services/${{ matrix.service }}

      - name: Snyk Python scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: false

  trivy-containers:
    name: Trivy — Container Scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - case-service
          - intake-service
          - ai-orchestrator
          - document-service
          - payment-service
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -t exitforge/${{ matrix.service }}:scan \
            exitforge/services/${{ matrix.service }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: exitforge/${{ matrix.service }}:scan
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  trivy-iac:
    name: Trivy — IaC Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy IaC scan (Terraform)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: exitforge/infrastructure/terraform
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Trivy IaC scan (Kubernetes)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: exitforge/infrastructure/kubernetes
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  notify-on-failure:
    name: Notify on Failure
    needs: [snyk-node, snyk-python, trivy-containers, trivy-iac]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 Nightly security scan FAILED — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
